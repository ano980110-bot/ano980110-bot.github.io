<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>河马挡住路了 - 互动课件原型</title>
  <style>
    :root {
      --orange: #f47b20;
      --orange-dark: #b95613;
      --green: #35a853;
      --green-dark: #22743a;
      --cream: #fff8dd;
      --ink: #2d2a20;
      --panel: rgba(255, 252, 229, 0.94);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
    }

    body {
      display: grid;
      place-items: center;
      background: #26321f;
      color: var(--ink);
      font-family: "PingFang SC", "Microsoft YaHei", "Noto Sans CJK SC", system-ui, sans-serif;
    }

    .page-wrap {
      width: min(100vw, calc(100vh * 16 / 9));
      aspect-ratio: 16 / 9;
      position: relative;
    }

    .lesson {
      width: 100%;
      height: 100%;
      position: relative;
      overflow: hidden;
      background: #d9ed9a;
      border-radius: 0;
      box-shadow: 0 24px 60px rgba(0, 0, 0, 0.36);
      user-select: none;
    }

    /* 背景：固定森林桥梁背景图。这里使用无河马背景，河马由独立 PNG 图层控制。 */
    .background-image {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: fill;
      pointer-events: none;
      z-index: 0;
    }

    .background-soften {
      position: absolute;
      inset: 0;
      background:
        linear-gradient(rgba(255, 255, 255, 0.04), rgba(255, 255, 255, 0.04)),
        radial-gradient(circle at 18% 18%, rgba(255, 255, 204, 0.22), transparent 32%);
      z-index: 1;
      pointer-events: none;
    }

    .title {
      position: absolute;
      top: 4%;
      left: 5%;
      width: 64%;
      margin: 0;
      padding: 1% 1.8%;
      color: #2f3b16;
      background: rgba(255, 253, 222, 0.88);
      border: 0.24vw solid rgba(91, 126, 36, 0.36);
      border-radius: 1vw;
      box-shadow: 0 0.45vw 0 rgba(93, 107, 43, 0.16);
      font-size: clamp(17px, 2.12vw, 36px);
      line-height: 1.2;
      letter-spacing: 0;
      white-space: nowrap;
      z-index: 4;
    }

    .top-tools {
      position: absolute;
      top: 4%;
      right: 3.2%;
      display: flex;
      gap: 0.7vw;
      z-index: 9;
    }

    .small-button {
      min-width: 6.8vw;
      min-height: 3.1vw;
      border: 0.18vw solid rgba(45, 42, 32, 0.22);
      border-radius: 0.8vw;
      background: rgba(255, 252, 229, 0.92);
      color: #33401d;
      font-size: clamp(14px, 1.25vw, 24px);
      font-weight: 800;
      cursor: pointer;
      box-shadow: 0 0.36vw 0 rgba(65, 75, 28, 0.24);
      transition: transform 180ms ease, box-shadow 180ms ease;
    }

    .small-button:hover {
      transform: translateY(-0.12vw);
      box-shadow: 0 0.5vw 0 rgba(65, 75, 28, 0.22);
    }

    .small-button:active {
      transform: translateY(0.2vw);
      box-shadow: 0 0.16vw 0 rgba(65, 75, 28, 0.24);
    }

    .animal-picker {
      position: absolute;
      left: 4.5%;
      bottom: 20%;
      display: flex;
      align-items: center;
      gap: 0.7vw;
      padding: 0.65vw 0.85vw;
      background: rgba(255, 252, 229, 0.82);
      border: 0.18vw solid rgba(96, 116, 41, 0.28);
      border-radius: 1vw;
      z-index: 8;
      transition: opacity 260ms ease, transform 260ms ease;
    }

    .lesson.is-running .animal-picker {
      opacity: 0;
      transform: translateY(0.9vw);
      pointer-events: none;
    }

    .animal-choice {
      width: clamp(38px, 4.1vw, 76px);
      height: clamp(38px, 4.1vw, 76px);
      padding: 0.18vw;
      border: 0.18vw solid rgba(65, 75, 28, 0.2);
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.88);
      cursor: pointer;
      box-shadow: 0 0.28vw 0 rgba(65, 75, 28, 0.18);
      transition: transform 180ms ease, border-color 180ms ease, background 180ms ease;
    }

    .animal-choice img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
      pointer-events: none;
    }

    .animal-choice:hover {
      transform: translateY(-0.16vw) scale(1.03);
    }

    .animal-choice.is-selected {
      border-color: #4b8a27;
      background: #f3ffd8;
    }

    .animal-choice:disabled {
      cursor: wait;
      opacity: 0.72;
    }

    /* 当前小动物：后续替换 PNG 时，换 data-animals 或同名图片即可。 */
    .animal {
      position: absolute;
      left: 9%;
      bottom: 28%;
      width: 15%;
      aspect-ratio: 1;
      z-index: 6;
      transform-origin: 50% 86%;
      transition:
        left 2400ms cubic-bezier(0.21, 0.8, 0.26, 1),
        bottom 2400ms cubic-bezier(0.21, 0.8, 0.26, 1),
        width 2400ms cubic-bezier(0.21, 0.8, 0.26, 1),
        transform 2400ms cubic-bezier(0.21, 0.8, 0.26, 1);
    }

    .animal img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      filter: drop-shadow(0 0.7vw 0.35vw rgba(38, 50, 22, 0.24));
      display: block;
      transform-origin: 50% 86%;
    }

    /* move-near 只作为流程状态；每只动物的靠近位置由 JS 配置单独控制。 */

    .lesson.choice-a .animal.is-roaring img {
      animation: roarVoice 900ms ease-in-out 3;
    }

    .lesson.choice-a .animal.is-pushing img {
      animation: pushForward 850ms ease-in-out 3;
    }

    .lesson.choice-a .animal.is-charging img {
      animation: chargeForward 950ms ease-in-out 2;
    }

    .lesson.choice-a .animal.is-reminding img {
      animation: floatRemind 1200ms ease-in-out 2;
    }

    .lesson.choice-a .animal.is-thinking img {
      animation: thinkNod 1200ms ease-in-out 2;
    }

    .lesson.group-pushing .animal {
      opacity: 0;
    }

    .group-push {
      position: absolute;
      inset: 0;
      z-index: 7;
      opacity: 0;
      pointer-events: none;
      transition: opacity 260ms ease;
    }

    .lesson.group-pushing .group-push {
      opacity: 1;
    }

    .group-animal {
      position: absolute;
      aspect-ratio: 1;
      transform: rotate(-3deg);
      transform-origin: 50% 86%;
      pointer-events: none;
    }

    .group-animal img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
      filter: drop-shadow(0 0.55vw 0.28vw rgba(38, 50, 22, 0.2));
      transform-origin: 50% 86%;
    }

    .lesson.group-pushing .group-animal img {
      animation: pushForward 850ms ease-in-out 3;
    }

    .lesson.choice-b.show-speech .animal img {
      animation: talkBody 1300ms ease-in-out 1;
    }

    .speech-bubble {
      position: absolute;
      left: 51.8%;
      bottom: 50%;
      width: 19%;
      min-height: 8.8%;
      padding: 1.1% 1.45%;
      background: #fffdf1;
      border: 0.2vw solid rgba(37, 90, 45, 0.34);
      border-radius: 1.2vw;
      box-shadow: 0 0.5vw 0 rgba(49, 80, 37, 0.14);
      font-size: clamp(15px, 1.5vw, 28px);
      line-height: 1.25;
      font-weight: 800;
      opacity: 0;
      transform: translateY(0.8vw) scale(0.92);
      transition: opacity 380ms ease, transform 380ms ease;
      z-index: 8;
      pointer-events: none;
    }

    .speech-bubble::after {
      content: "";
      position: absolute;
      left: var(--speech-tail-left, 13%);
      bottom: -1.05vw;
      width: 1.4vw;
      height: 1.4vw;
      background: #fffdf1;
      border-right: 0.2vw solid rgba(37, 90, 45, 0.34);
      border-bottom: 0.2vw solid rgba(37, 90, 45, 0.34);
      transform: rotate(45deg);
    }

    .lesson.show-speech .speech-bubble {
      opacity: 1;
      transform: translateY(0) scale(1);
    }

    /* 河马图层：叠加在无河马背景上，B 选项会切换睡觉/醒来/站立/走开状态。 */
    .hippo {
      position: absolute;
      right: 2%;
      top: -6%;
      width: 48%;
      z-index: 3;
      opacity: 1;
      pointer-events: none;
      transform: translateX(0);
      transform-origin: 58% 76%;
      filter: drop-shadow(0 0.55vw 0.28vw rgba(38, 50, 22, 0.14));
      transition:
        transform 1400ms cubic-bezier(0.25, 0.85, 0.32, 1),
        opacity 250ms ease;
    }

    .lesson.hippo-awake .hippo {
      animation: hippoWake 1100ms ease-in-out 1;
    }

    .lesson.hippo-standing .hippo {
      animation: hippoStand 1100ms ease-in-out 1;
    }

    .lesson.hippo-leaving .hippo {
      transform: translateX(52vw);
      opacity: 0;
      transition:
        transform 2600ms cubic-bezier(0.25, 0.85, 0.32, 1),
        opacity 900ms ease 1700ms;
    }

    .hippo-zone {
      position: absolute;
      right: 8%;
      top: 18%;
      width: 35%;
      height: 44%;
      z-index: 3;
      pointer-events: none;
    }

    .wrong-mark,
    .idea-mark,
    .kind-mark {
      position: absolute;
      inset: auto;
      opacity: 0;
      pointer-events: none;
    }

    .wrong-mark {
      left: 36%;
      bottom: 62%;
      width: 7.4vw;
      height: 7.4vw;
      border-radius: 50%;
      background: rgba(255, 238, 213, 0.9);
      border: 0.4vw solid rgba(244, 123, 32, 0.82);
      z-index: 7;
      transform: scale(0.7);
    }

    .wrong-mark::before,
    .wrong-mark::after {
      content: "";
      position: absolute;
      left: 20%;
      top: 45%;
      width: 60%;
      height: 10%;
      border-radius: 999px;
      background: #e3561c;
    }

    .wrong-mark::before {
      transform: rotate(45deg);
    }

    .wrong-mark::after {
      transform: rotate(-45deg);
    }

    .lesson.choice-a.push-action.show-wrong .wrong-mark {
      opacity: 1;
      transform: scale(1);
      transition: opacity 380ms ease, transform 380ms ease;
      animation: softShake 820ms ease-in-out 2;
    }

    .idea-mark {
      left: 36%;
      bottom: 62%;
      width: 7.7vw;
      height: 7.7vw;
      border-radius: 50%;
      background:
        radial-gradient(circle at 50% 45%, rgba(255, 255, 232, 0.98) 0 36%, rgba(255, 234, 115, 0.95) 37% 70%, rgba(255, 205, 50, 0.78) 71% 100%);
      border: 0.34vw solid rgba(232, 165, 24, 0.86);
      box-shadow:
        0 0.42vw 0 rgba(122, 91, 19, 0.14),
        0 0 2.2vw rgba(255, 232, 83, 0.52);
      z-index: 7;
      transform: scale(0.72) rotate(-8deg);
    }

    .idea-mark::before {
      content: "?";
      position: absolute;
      inset: 10% 0 auto 0;
      color: #a96905;
      font-size: clamp(44px, 5.7vw, 104px);
      font-weight: 900;
      line-height: 1;
      text-align: center;
      text-shadow: 0 0.15vw 0 rgba(255, 255, 255, 0.76);
    }

    .idea-mark::after {
      content: "";
      position: absolute;
      left: 28%;
      bottom: 15%;
      width: 44%;
      height: 10%;
      border-radius: 999px;
      background: rgba(176, 112, 9, 0.58);
      box-shadow:
        -2.4vw -1.2vw 0 -0.58vw rgba(255, 238, 113, 0.9),
        2.3vw -1.6vw 0 -0.62vw rgba(255, 238, 113, 0.88),
        0.3vw -3.6vw 0 -0.66vw rgba(255, 238, 113, 0.82);
    }

    .lesson.choice-a.push-action.show-idea .idea-mark {
      opacity: 1;
      transform: scale(1) rotate(0deg);
      transition: opacity 380ms ease, transform 480ms cubic-bezier(0.21, 1.18, 0.28, 1);
      animation: ideaPulse 1250ms ease-in-out 2;
    }

    .kind-mark {
      left: 35%;
      bottom: 61%;
      width: 10vw;
      height: 10vw;
      border-radius: 50%;
      background:
        radial-gradient(circle at center, rgba(255, 253, 185, 0.58) 0 28%, transparent 52%),
        conic-gradient(from 0deg, transparent, rgba(255, 242, 90, 0.6), transparent, rgba(255, 242, 90, 0.55), transparent);
      z-index: 7;
      transform: scale(0.5) rotate(-12deg);
    }

    .kind-mark::before {
      content: "☺";
      position: absolute;
      inset: 28% 0 auto 0;
      text-align: center;
      color: #3a8b43;
      font-size: clamp(42px, 6vw, 110px);
      font-weight: 900;
      line-height: 1;
      text-shadow: 0 0.18vw 0 rgba(255, 255, 255, 0.8);
    }

    .kind-star {
      position: absolute;
      width: 2vw;
      height: 2vw;
      background: #fff075;
      clip-path: polygon(50% 0, 61% 34%, 98% 35%, 68% 56%, 79% 91%, 50% 70%, 21% 91%, 32% 56%, 2% 35%, 39% 34%);
      filter: drop-shadow(0 0.15vw 0 rgba(129, 118, 15, 0.18));
    }

    .kind-star.s1 {
      left: 12%;
      top: 18%;
    }

    .kind-star.s2 {
      right: 15%;
      top: 34%;
      transform: scale(0.8) rotate(25deg);
    }

    .kind-star.s3 {
      left: 38%;
      bottom: 18%;
      transform: scale(0.7) rotate(-18deg);
    }

    .lesson.choice-b.hippo-heard .kind-mark {
      opacity: 1;
      transform: scale(1) rotate(0deg);
      transition: opacity 450ms ease, transform 650ms cubic-bezier(0.21, 1.15, 0.28, 1);
      animation: kindPulse 1600ms ease-in-out infinite;
    }

    .choice-panel {
      position: absolute;
      left: 50%;
      bottom: 4%;
      width: min(86%, 1100px);
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 2.2%;
      transform: translateX(-50%);
      z-index: 10;
      transition: opacity 280ms ease, transform 280ms ease;
    }

    .lesson.is-running .choice-panel {
      opacity: 0;
      transform: translateX(-50%) translateY(1vw);
      pointer-events: none;
    }

    .asset-status {
      position: absolute;
      left: 50%;
      bottom: 17.2%;
      z-index: 11;
      transform: translateX(-50%);
      padding: 0.7vw 1.15vw;
      border-radius: 999px;
      background: rgba(255, 252, 229, 0.92);
      border: 0.18vw solid rgba(96, 116, 41, 0.24);
      color: #253318;
      font-size: clamp(14px, 1.2vw, 24px);
      font-weight: 800;
      box-shadow: 0 0.28vw 0 rgba(65, 75, 28, 0.15);
      transition: opacity 240ms ease, transform 240ms ease;
      pointer-events: none;
    }

    .lesson.assets-ready .asset-status {
      opacity: 0;
      transform: translateX(-50%) translateY(0.5vw);
    }

    /* A 按钮：推开它。 */
    .choice-button {
      min-height: clamp(72px, 7vw, 132px);
      padding: 1.1% 2%;
      border: 0;
      border-radius: 1.1vw;
      color: #fff;
      font-size: clamp(22px, 2.25vw, 46px);
      line-height: 1.15;
      font-weight: 900;
      letter-spacing: 0;
      cursor: pointer;
      text-shadow: 0 0.12vw 0 rgba(0, 0, 0, 0.2);
      transition: transform 180ms ease, filter 180ms ease, box-shadow 180ms ease;
    }

    .choice-button:hover {
      transform: translateY(-0.18vw);
      filter: brightness(1.04);
    }

    .choice-button:active {
      transform: translateY(0.22vw);
    }

    .choice-button:disabled {
      cursor: wait;
      filter: grayscale(0.16) brightness(0.92);
      opacity: 0.72;
      transform: none;
    }

    .choice-button strong {
      display: block;
      font-size: 1.25em;
    }

    .choice-a-button {
      background: linear-gradient(#ff9a38, var(--orange));
      box-shadow: 0 0.65vw 0 var(--orange-dark);
    }

    .choice-a-button:active {
      box-shadow: 0 0.28vw 0 var(--orange-dark);
    }

    /* B 按钮：说“请你让一让”。 */
    .choice-b-button {
      background: linear-gradient(#59c76f, var(--green));
      box-shadow: 0 0.65vw 0 var(--green-dark);
    }

    .choice-b-button:active {
      box-shadow: 0 0.28vw 0 var(--green-dark);
    }

    /* 反馈框：A/B 只会显示当前点击选项对应的一种反馈。 */
    .feedback {
      position: absolute;
      left: 50%;
      bottom: 4.6%;
      width: min(74%, 1020px);
      min-height: 19%;
      padding: 1.5% 2%;
      display: grid;
      grid-template-columns: 1fr auto;
      align-items: center;
      gap: 2%;
      background: var(--panel);
      border: 0.32vw solid rgba(244, 123, 32, 0.74);
      border-radius: 1.2vw;
      box-shadow: 0 0.75vw 0 rgba(86, 72, 33, 0.2);
      opacity: 0;
      transform: translateX(-50%) translateY(1.2vw) scale(0.96);
      pointer-events: none;
      transition: opacity 360ms ease, transform 360ms ease;
      z-index: 11;
    }

    .feedback.is-visible {
      opacity: 1;
      transform: translateX(-50%) translateY(0) scale(1);
      pointer-events: auto;
    }

    .feedback.is-kind {
      border-color: rgba(53, 168, 83, 0.78);
    }

    .feedback.is-idea {
      border-color: rgba(235, 174, 37, 0.82);
    }

    .feedback-title {
      margin: 0 0 0.45vw;
      font-size: clamp(21px, 2.05vw, 40px);
      line-height: 1.15;
      font-weight: 900;
    }

    .feedback-text {
      margin: 0;
      font-size: clamp(16px, 1.5vw, 30px);
      line-height: 1.32;
      font-weight: 700;
    }

    .feedback-action {
      min-width: 15vw;
      min-height: 5.8vw;
      padding: 0 1.5vw;
      border: 0;
      border-radius: 1vw;
      color: #fff;
      font-size: clamp(18px, 1.7vw, 34px);
      font-weight: 900;
      cursor: pointer;
      box-shadow: 0 0.5vw 0 rgba(63, 62, 31, 0.28);
      transition: transform 180ms ease, box-shadow 180ms ease, filter 180ms ease;
    }

    .feedback-actions {
      display: flex;
      flex-wrap: wrap;
      justify-content: flex-end;
      gap: 1vw;
    }

    .feedback-action[hidden] {
      display: none;
    }

    .feedback-action:hover {
      transform: translateY(-0.16vw);
      filter: brightness(1.04);
    }

    .feedback-action:active {
      transform: translateY(0.18vw);
      box-shadow: 0 0.2vw 0 rgba(63, 62, 31, 0.28);
    }

    .feedback-action.is-orange {
      background: linear-gradient(#ff9b3a, var(--orange));
    }

    .feedback-action.is-green {
      background: linear-gradient(#59c76f, var(--green));
    }

    .path-glow {
      position: absolute;
      left: 48%;
      top: 42%;
      width: 33%;
      height: 19%;
      border-radius: 50%;
      background: radial-gradient(ellipse at center, rgba(255, 249, 142, 0.4), transparent 64%);
      opacity: 0;
      transform: rotate(-12deg) scale(0.7);
      z-index: 2;
      pointer-events: none;
      transition: opacity 420ms ease, transform 580ms ease;
    }

    .lesson.story-continue .path-glow {
      opacity: 1;
      transform: rotate(-12deg) scale(1);
    }

    @keyframes pushForward {
      0%,
      100% {
        transform: translateX(0);
      }

      40% {
        transform: translateX(1.1vw) scaleX(0.96);
      }

      65% {
        transform: translateX(-0.25vw);
      }
    }

    @keyframes roarVoice {
      0%,
      100% {
        transform: scale(1) rotate(0);
      }

      35% {
        transform: scale(1.06) rotate(-2deg);
      }

      65% {
        transform: scale(0.98) rotate(2deg);
      }
    }

    @keyframes chargeForward {
      0%,
      100% {
        transform: translateX(0);
      }

      42% {
        transform: translateX(1.8vw) scaleX(1.04);
      }

      68% {
        transform: translateX(-0.45vw) scaleX(0.98);
      }
    }

    @keyframes floatRemind {
      0%,
      100% {
        transform: translateY(0) rotate(0);
      }

      50% {
        transform: translateY(-0.7vw) rotate(-2deg);
      }
    }

    @keyframes thinkNod {
      0%,
      100% {
        transform: translateY(0) rotate(0);
      }

      42% {
        transform: translateY(0.25vw) rotate(3deg);
      }

      72% {
        transform: translateY(-0.25vw) rotate(-2deg);
      }
    }

    @keyframes talkBody {
      0%,
      100% {
        transform: translateY(0) rotate(0);
      }

      38% {
        transform: translateY(-0.45vw) rotate(-3deg);
      }

      72% {
        transform: translateY(0.12vw) rotate(2deg);
      }
    }

    @keyframes hippoWake {
      0%,
      100% {
        transform: translateY(0) rotate(0);
      }

      45% {
        transform: translateY(-0.35vw) rotate(-1.2deg);
      }
    }

    @keyframes hippoStand {
      0%,
      100% {
        transform: translateY(0) scale(1);
      }

      45% {
        transform: translateY(-0.55vw) scale(1.015);
      }
    }

    @keyframes softShake {
      0%,
      100% {
        translate: 0 0;
      }

      25% {
        translate: 0.28vw 0;
      }

      50% {
        translate: -0.28vw 0;
      }

      75% {
        translate: 0.16vw 0;
      }
    }

    @keyframes ideaPulse {
      0%,
      100% {
        filter: brightness(1) saturate(1);
      }

      50% {
        filter: brightness(1.1) saturate(1.08);
      }
    }

    @keyframes kindPulse {
      0%,
      100% {
        filter: saturate(1) brightness(1);
      }

      50% {
        filter: saturate(1.1) brightness(1.08);
      }
    }

    @media (max-width: 760px) {
      .title {
        width: 72%;
      }

      .animal-picker {
        bottom: 22%;
      }

      .feedback {
        width: 88%;
        grid-template-columns: 1fr;
      }

      .feedback-action {
        width: 100%;
      }

      .feedback-actions {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <main class="page-wrap" aria-label="16:9 互动课件页面">
    <section class="lesson" id="lesson">
      <img class="background-image" id="backgroundImage" src="背景图_无河马.png" alt="森林桥梁背景，桥上没有河马">

      <!-- 角色素材：这里预留五只小动物，后续可替换为同名 PNG 或修改 JS 里的 animals 数组。 -->
      <nav class="animal-picker" aria-label="选择当前小动物">

          <img src="transparent_assets/狮子_透明.png" alt="">
        </button>
        <button class="animal-choice" type="button" data-animal="monkey" aria-label="猴子" disabled>

        <button class="animal-choice" type="button" data-animal="mouse" aria-label="小老鼠" disabled>

      <!-- 当前小动物：课堂演示时从左下方出发，点击 A/B 后向河马方向移动。 -->

        <img id="animalImage" src="transparent_assets/狮子_透明.png" alt="当前小动物：狮子">
      </div>
      <div class="group-push" id="groupPush" aria-hidden="true"></div>

      <div class="speech-bubble" id="speechBubble">请你让一让，好吗？</div>

      <!-- 河马图层：独立于背景，方便 B 选项控制醒来、站立和走开。 -->
      <img class="hippo" id="hippoImage" src="transparent_assets/河马_睡觉.png" alt="睡觉的河马">
      <div class="hippo-zone" aria-label="睡觉的河马区域"></div>
      <div class="wrong-mark" aria-hidden="true"></div>

      <div class="choice-panel" id="choicePanel">
        <button class="choice-button choice-a-button" type="button" id="choiceA" disabled>
          <strong>A</strong>
          推开它
        </button>
        <button class="choice-button choice-b-button" type="button" id="choiceB" disabled>
          <strong>B</strong>
          说：“请你让一让。”
        </button>
      </div>

      <!-- 反馈框：由 JS 根据 A 或 B 单独填入内容。 -->
      <aside class="feedback" id="feedback" role="status" aria-live="polite">
        <div>
          <h2 class="feedback-title" id="feedbackTitle"></h2>

    </section>
  </main>

  <script>
    // 角色配置：每只小动物包含默认图、A 分支动作图，以及已经调好的尺寸和位置。
    const animals = {

      monkey: {

        pushSrc: "transparent_assets/猴子_推.png",
        idleWidth: "16%",

        markLeft: "40%",
        markBottom: "62%",
        actionA: {
          label: "推开它",
          type: "push",
          speech: "",
          feedbackTitle: "再想想",
          feedbackText: "猴子用力推，河马还是没有走开。推别人可能让别人不舒服，也不一定能解决问题。"
        }
      },
      bird: {
        name: "小鸟",
        idleSrc: "transparent_assets/小鸟_透明.png",
        actionSrc: "transparent_assets/小鸟_透明.png",
        pushSrc: "transparent_assets/小鸟_透明.png",
        idleWidth: "13%",
        nearWidth: "14.5%",
        startLeft: "10%",
        startBottom: "33%",
        nearLeft: "48%",
        nearBottom: "49%",
        pushLeft: "48%",
        pushBottom: "49%",
        speechLeft: "57%",
        speechBottom: "68%",
        speechWidth: "18%",
        speechTailLeft: "8%",
        markLeft: "42%",
        markBottom: "63%",
        actionA: {
          label: "提醒大家",
          type: "remind",
          speech: "这样好像不太有用。",
          feedbackTitle: "换个办法",
          feedbackText: "小鸟提醒大家：这样好像不太有用。也许我们可以换一种办法。"
        }
      },
      mouse: {
        name: "小老鼠",
        idleSrc: "transparent_assets/小老鼠_透明.png",
        actionSrc: "transparent_assets/小老鼠_透明.png",
        pushSrc: "transparent_assets/小老鼠_透明.png",
        idleWidth: "10%",
        nearWidth: "11%",
        startLeft: "12%",
        startBottom: "27%",
        nearLeft: "51%",
        nearBottom: "43%",
        pushLeft: "51%",
        pushBottom: "43%",
        speechLeft: "58%",
        speechBottom: "57%",
        speechWidth: "18%",
        speechTailLeft: "8%",
        markLeft: "46%",
        markBottom: "54%",
        actionA: {
          label: "想个办法",
          type: "think",
          speech: "我可以好好说。",
          feedbackTitle: "想想办法",
          feedbackText: "小老鼠没有用力推。它想到了一个更友好的办法：请你让一让。"
        }
      }
    };

    const lesson = document.getElementById("lesson");
    const animal = document.getElementById("animal");
    const animalImage = document.getElementById("animalImage");
    const groupPush = document.getElementById("groupPush");
    const speechBubble = document.getElementById("speechBubble");
    const wrongMark = document.querySelector(".wrong-mark");
    const ideaMark = document.querySelector(".idea-mark");
    const kindMark = document.querySelector(".kind-mark");
    const backgroundImage = document.getElementById("backgroundImage");
    const hippoImage = document.getElementById("hippoImage");
    const choiceA = document.getElementById("choiceA");
    const choiceB = document.getElementById("choiceB");
    const resetButton = document.getElementById("resetButton");
    const feedback = document.getElementById("feedback");
    const feedbackTitle = document.getElementById("feedbackTitle");
    const feedbackText = document.getElementById("feedbackText");
    const feedbackAction = document.getElementById("feedbackAction");
    const feedbackSecondaryAction = document.getElementById("feedbackSecondaryAction");
    const animalChoices = document.querySelectorAll(".animal-choice");
    const assetStatus = document.getElementById("assetStatus");

    const hippoStates = {
      sleeping: {
        src: "transparent_assets/河马_睡觉.png",
        alt: "睡觉的河马"
      },
      awake: {
        src: "transparent_assets/河马_醒来.png",
        alt: "醒来的河马"
      },
      standing: {
        src: "transparent_assets/河马_站立.png",
        alt: "站起来的河马"
      },
      leaving: {
        src: "transparent_assets/河马_走开.png",
        alt: "走开的河马"
      }
    };

    const groupPushAnimals = [
      {
        key: "lion",
        left: "35%",
        bottom: "37%",
        width: "17.5%",
        zIndex: 4
      },
      {
        key: "warthog",
        left: "43%",
        bottom: "38%",
        width: "15%",
        zIndex: 5
      },
      {
        key: "monkey",
        left: "39.5%",
        bottom: "51%",
        width: "12.5%",
        zIndex: 6
      },
      {
        key: "bird",
        left: "52%",
        bottom: "55%",
        width: "9.8%",
        zIndex: 7
      },
      {
        key: "mouse",
        left: "55%",
        bottom: "40%",
        width: "7.5%",
        zIndex: 8
      }
    ];

    let activeAnimalKey = "lion";
    let timers = [];
    let assetsAreReady = false;
    const preloadedAssets = new Map();

    const actionClasses = ["is-roaring", "is-pushing", "is-charging", "is-reminding", "is-thinking"];
    const forceActionTypes = ["roar", "push", "charge"];
    const ideaActionTypes = ["remind", "think"];
    const groupPromptActionTypes = ["push", "charge"];

    function wait(ms, callback) {
      const timer = window.setTimeout(callback, ms);
      timers.push(timer);
    }

    function clearTimers() {
      timers.forEach((timer) => window.clearTimeout(timer));
      timers = [];
    }

    function setButtonsDisabled(isDisabled) {
      const shouldDisable = isDisabled || !assetsAreReady;
      choiceA.disabled = shouldDisable;
      choiceB.disabled = shouldDisable;
      animalChoices.forEach((button) => {
        button.disabled = shouldDisable;
      });
    }

    function collectAssetSources() {
      const sources = new Set(["背景图_无河马.png"]);

      Object.values(animals).forEach((animalInfo) => {
        sources.add(animalInfo.idleSrc);
        sources.add(animalInfo.actionSrc);
        sources.add(animalInfo.pushSrc);
      });

      Object.values(hippoStates).forEach((state) => {
        sources.add(state.src);
      });

      return Array.from(sources).filter(Boolean);
    }

    function preloadImage(src) {
      if (preloadedAssets.has(src)) {
        return preloadedAssets.get(src);
      }

      const promise = new Promise((resolve) => {
        const image = new Image();

        image.onload = () => {
          const decode = image.decode ? image.decode().catch(() => null) : Promise.resolve();
          decode.then(() => resolve({ src, ok: true }));
        };

        image.onerror = () => resolve({ src, ok: false });
        image.src = src;
      });

      preloadedAssets.set(src, promise);
      return promise;
    }

    // 线上访问时动作 PNG 首次下载较慢；先预加载，避免点 A/B 后气泡先出、动作图还没显示。
    function preloadLessonAssets() {
      const sources = collectAssetSources();
      let loadedCount = 0;

      setButtonsDisabled(true);
      assetStatus.textContent = `素材准备中 0/${sources.length}`;

      Promise.all(sources.map((src) => preloadImage(src).then((result) => {
        loadedCount += 1;
        assetStatus.textContent = `素材准备中 ${loadedCount}/${sources.length}`;
        return result;
      }))).then(() => {
        assetsAreReady = true;
        lesson.classList.add("assets-ready");
        assetStatus.textContent = "素材已准备好";
        setButtonsDisabled(false);
      });
    }

    function applyAnimalPosition(mode = "start") {
      const current = animals[activeAnimalKey];
      if (!current) return;

      if (mode === "start") {
        animal.style.left = current.startLeft;
        animal.style.bottom = current.startBottom;
        animal.style.width = current.idleWidth;
        animal.style.transform = "rotate(0deg)";
      }

      if (mode === "near") {
        animal.style.left = current.nearLeft;
        animal.style.bottom = current.nearBottom;
        animal.style.width = current.nearWidth;
        animal.style.transform = "rotate(-3deg)";
      }

      if (mode === "push") {
        animal.style.left = current.pushLeft || current.nearLeft;
        animal.style.bottom = current.pushBottom || current.nearBottom;
        animal.style.width = current.nearWidth;
        animal.style.transform = "rotate(-3deg)";
      }
    }

    // 语言气泡位置：跟随当前小动物靠近河马后的站位，避免 B 选项里气泡和角色错位。
    function applySpeechBubblePosition() {
      const current = animals[activeAnimalKey];
      if (!current) return;

      speechBubble.style.left = current.speechLeft || "51.8%";
      speechBubble.style.bottom = current.speechBottom || "50%";
      speechBubble.style.width = current.speechWidth || "19%";
      speechBubble.style.setProperty("--speech-tail-left", current.speechTailLeft || "13%");
    }

    // 反馈图标位置：跟随当前小动物，放在角色左侧/左上方，避免和气泡或河马重叠。
    function applyFeedbackMarkPosition() {
      const current = animals[activeAnimalKey];
      if (!current) return;

      [wrongMark, ideaMark, kindMark].forEach((mark) => {
        mark.style.left = current.markLeft || "36%";
        mark.style.bottom = current.markBottom || "62%";
        mark.style.right = "";
        mark.style.top = "";
      });
    }

    function updateChoiceALabel() {
      const current = animals[activeAnimalKey];
      if (!current || !current.actionA) return;

      choiceA.innerHTML = `
        <strong>A</strong>
        ${current.actionA.label}
      `;
    }

    function clearAnimalActionClasses() {
      actionClasses.forEach((className) => animal.classList.remove(className));
    }

    function showSpeech(text) {
      speechBubble.textContent = text;
      applySpeechBubblePosition();
      lesson.classList.add("show-speech");
    }

    function setAnimal(key) {
      const nextAnimal = animals[key];
      if (!nextAnimal) return;

      activeAnimalKey = key;
      animalImage.src = nextAnimal.idleSrc;
      animalImage.alt = `当前小动物：${nextAnimal.name}`;
      applyAnimalPosition("start");
      applySpeechBubblePosition();
      applyFeedbackMarkPosition();
      updateChoiceALabel();

      animalChoices.forEach((button) => {
        button.classList.toggle("is-selected", button.dataset.animal === key);
      });
    }

    function setHippoState(stateKey) {
      const nextState = hippoStates[stateKey];
      if (!nextState) return;

      hippoImage.src = nextState.src;
      hippoImage.alt = nextState.alt;
    }

    function hideFeedback() {
      feedback.className = "feedback";
      feedbackTitle.textContent = "";
      feedbackText.textContent = "";
      feedbackAction.textContent = "";
      feedbackAction.className = "feedback-action";
      feedbackAction.onclick = null;
      feedbackSecondaryAction.textContent = "";
      feedbackSecondaryAction.className = "feedback-action";
      feedbackSecondaryAction.onclick = null;
      feedbackSecondaryAction.hidden = true;
    }

    function clearGroupPush() {
      groupPush.innerHTML = "";
      groupPush.setAttribute("aria-hidden", "true");
    }

    function renderGroupPush() {
      groupPush.innerHTML = "";

      groupPushAnimals.forEach((item) => {
        const animalInfo = animals[item.key];
        const wrapper = document.createElement("div");
        const image = document.createElement("img");

        wrapper.className = "group-animal";
        wrapper.style.left = item.left;
        wrapper.style.bottom = item.bottom;
        wrapper.style.width = item.width;
        wrapper.style.zIndex = item.zIndex;

        image.src = animalInfo.pushSrc;
        image.alt = `${animalInfo.name}正在一起推`;

        wrapper.appendChild(image);
        groupPush.appendChild(wrapper);
      });

      groupPush.setAttribute("aria-hidden", "false");
    }

    function showActionFeedback(action) {
      const isIdeaAction = ideaActionTypes.includes(action.type);
      const isThinkAction = action.type === "think";

      feedbackTitle.textContent = action.feedbackTitle;
      feedbackText.textContent = action.feedbackText;
      feedbackAction.textContent = isThinkAction ? "试试好好说" : "再试一次";
      feedbackAction.className = `feedback-action ${isThinkAction ? "is-green" : "is-orange"}`;
      feedbackAction.onclick = isThinkAction ? chooseB : resetScene;
      feedbackSecondaryAction.textContent = "";
      feedbackSecondaryAction.onclick = null;
      feedbackSecondaryAction.hidden = true;
      feedback.className = `feedback is-visible${isIdeaAction ? " is-idea" : ""}`;
    }

    function showSinglePushPrompt() {
      feedbackTitle.textContent = "要不要一起试试？";
      feedbackText.textContent = "它一个人没有成功，要不要请大家一起试试？";
      feedbackAction.textContent = "大家一起推";
      feedbackAction.className = "feedback-action is-orange";
      feedbackAction.onclick = startGroupPush;
      feedbackSecondaryAction.textContent = "再试一次";
      feedbackSecondaryAction.className = "feedback-action is-green";
      feedbackSecondaryAction.onclick = resetScene;
      feedbackSecondaryAction.hidden = false;
      feedback.className = "feedback is-visible";
    }

    function showFinalPushFeedback() {
      feedbackTitle.textContent = "还是没有成功";
      feedbackText.textContent = "大家一起用力，河马还是没有走开。用力推不一定能解决问题，我们可以试试好好说。";
      feedbackAction.textContent = "再试一次";
      feedbackAction.className = "feedback-action is-orange";
      feedbackAction.onclick = resetScene;
      feedbackSecondaryAction.textContent = "试试好好说";
      feedbackSecondaryAction.className = "feedback-action is-green";
      feedbackSecondaryAction.onclick = chooseB;
      feedbackSecondaryAction.hidden = false;
      feedback.className = "feedback is-visible";
    }

    function startGroupPush() {
      hideFeedback();
      clearTimers();
      animal.classList.remove("is-pushing");
      lesson.classList.remove("push-action");
      renderGroupPush();
      lesson.classList.add("group-pushing");

      wait(2850, () => {
        lesson.classList.add("push-action");
        showFinalPushFeedback();
      });
    }

    // 重置逻辑：恢复初始画面，只显示背景、小动物和 A/B 两个按钮。
    function resetScene() {
      clearTimers();
      hippoImage.style.transition = "none";
      lesson.className = assetsAreReady ? "lesson assets-ready" : "lesson";
      clearAnimalActionClasses();
      clearGroupPush();
      speechBubble.textContent = "请你让一让，好吗？";
      backgroundImage.src = "背景图_无河马.png";
      backgroundImage.alt = "森林桥梁背景，桥上没有河马";
      setHippoState("sleeping");
      hippoImage.style.opacity = "1";
      hippoImage.style.transform = "translateX(0)";
      void hippoImage.offsetWidth;
      hippoImage.style.transition = "";
      hippoImage.style.opacity = "";
      hippoImage.style.transform = "";
      hideFeedback();
      setAnimal(activeAnimalKey);
      setButtonsDisabled(false);
    }

    // A 按钮逻辑：根据当前小动物播放不同剧情动作，但河马始终不动。
    function chooseA() {
      resetScene();
      setButtonsDisabled(true);
      const currentAnimal = animals[activeAnimalKey];
      const action = currentAnimal.actionA;
      const actionClassMap = {
        roar: "is-roaring",
        push: "is-pushing",
        charge: "is-charging",
        remind: "is-reminding",
        think: "is-thinking"
      };

      animalImage.src = currentAnimal.idleSrc;
      animalImage.alt = `当前小动物：${currentAnimal.name}`;
      lesson.classList.add("is-running", "choice-a", "move-near");
      applyAnimalPosition("near");
      applySpeechBubblePosition();
      applyFeedbackMarkPosition();

      wait(2450, () => {
        animalImage.src = currentAnimal.actionSrc || currentAnimal.pushSrc || currentAnimal.idleSrc;
        animalImage.alt = `当前小动物正在尝试：${currentAnimal.name}`;
        applyAnimalPosition("push");
        clearAnimalActionClasses();
        const actionClass = actionClassMap[action.type];
        if (actionClass) {
          animal.classList.add(actionClass);
        }

        if (action.speech) {
          showSpeech(action.speech);
        }
      });

      wait(5300, () => {
        clearAnimalActionClasses();
        lesson.classList.add("push-action");

        if (groupPromptActionTypes.includes(action.type)) {
          lesson.classList.add("show-wrong");
          showSinglePushPrompt();
          return;
        }

        if (action.type === "roar") {
          lesson.classList.add("show-wrong");
          showActionFeedback(action);
          return;
        }

        if (ideaActionTypes.includes(action.type)) {
          lesson.classList.add("show-idea");
          showActionFeedback(action);
          return;
        }

        if (forceActionTypes.includes(action.type)) {
          lesson.classList.add("show-wrong");
        }

        showActionFeedback(action);
      });
    }

    // B 按钮逻辑：小动物靠近河马，说出礼貌请求，河马醒来、站起并走开，出现绿色反馈。
    function chooseB() {
      resetScene();
      setButtonsDisabled(true);
      lesson.classList.add("is-running", "choice-b", "move-near");
      applyAnimalPosition("near");
      applySpeechBubblePosition();
      applyFeedbackMarkPosition();

      wait(2450, () => {
        showSpeech("请你让一让，好吗？");
      });

      wait(3900, () => {
        setHippoState("awake");
        lesson.classList.add("hippo-awake");
      });

      wait(5350, () => {
        setHippoState("standing");
        lesson.classList.add("hippo-standing");
      });

      wait(6800, () => {
        setHippoState("leaving");
      });

      wait(7000, () => {
        lesson.classList.add("hippo-leaving");
      });

      wait(10000, () => {
        feedbackTitle.textContent = "好好说";
        feedbackText.textContent = "这个办法更友好。你用了好好说的方法。";
        feedbackAction.textContent = "继续故事";
        feedbackAction.className = "feedback-action is-green";
        feedbackAction.onclick = continueStory;
        feedbackSecondaryAction.hidden = true;
        feedback.className = "feedback is-visible is-kind";
      });
    }

    // 继续逻辑：在 Genially 中可改成 Go to page；这里用道路亮光表示故事继续。
    function continueStory() {
      lesson.classList.add("story-continue");
      feedbackTitle.textContent = "故事继续";
      feedbackText.textContent = "小动物们可以准备排队过桥了。";
      feedbackAction.textContent = "重置";
      feedbackAction.onclick = resetScene;
      feedbackSecondaryAction.hidden = true;
    }

    choiceA.addEventListener("click", chooseA);
    choiceB.addEventListener("click", chooseB);
    resetButton.addEventListener("click", resetScene);

    animalChoices.forEach((button) => {
      button.addEventListener("click", () => setAnimal(button.dataset.animal));
    });

    resetScene();
    preloadLessonAssets();
  </script>
</body>
</html>
